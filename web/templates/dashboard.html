<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="/static/dashboard.css">
</head>
<body>
<main class="page">
    <header class="page__header">
        <div>
            <h1>Bot Statistics</h1>
            <p class="subtitle">Online dashboard for monitoring Telegram bot activity.</p>
        </div>
        <div class="header-actions">
            <div class="status-chip" id="dashboard-status">ONLINE</div>
            <button class="chip-button" id="theme-toggle">Dark</button>
            <button class="logout-button" onclick="logout()">Logout</button>
        </div>
    </header>

    <div class="grid">
        <article class="card">
            <header>
                <h3>Active Users</h3>
                <p>Users active in last 15 minutes</p>
            </header>
            <div id="active-users-list" class="list"></div>
        </article>

        <article class="card">
            <header>
                <h3>Top Downloaders</h3>
                <p>Users with most downloads</p>
            </header>
            <div id="top-users-list" class="list"></div>
        </article>

        <article class="card">
            <header>
                <h3>Top Domains</h3>
                <p>Most requested domains</p>
            </header>
            <div id="domains-list" class="list"></div>
        </article>

        <article class="card">
            <header>
                <h3>NSFW Stats</h3>
                <p>NSFW content requests</p>
            </header>
            <div id="nsfw-users-list" class="list"></div>
        </article>
    </div>
</main>

<script>
    async function fetchJSON(url) {
        try {
            const res = await fetch(url);
            if (!res.ok) return [];
            return await res.json();
        } catch(e) {
            return [];
        }
    }

    async function loadActiveUsers() {
        const data = await fetchJSON('/api/active-users?limit=10');
        const container = document.getElementById('active-users-list');
        if (data && data.length) {
            container.innerHTML = data.map(u => `<div class="list-row"><strong>${u.user_id || 'Unknown'}</strong> <span class="badge">${u.count || 0}</span></div>`).join('');
        } else {
            container.innerHTML = '<p>No active users</p>';
        }
    }

    async function loadTopDownloaders() {
        const data = await fetchJSON('/api/top-downloaders?period=all&limit=10');
        const container = document.getElementById('top-users-list');
        if (data && data.length) {
            container.innerHTML = data.map(u => `<div class="list-row"><strong>${u.user_id || 'Unknown'}</strong> <span class="badge">${u.count || 0}</span></div>`).join('');
        } else {
            container.innerHTML = '<p>No data</p>';
        }
    }

    async function loadTopDomains() {
        const data = await fetchJSON('/api/top-domains?period=all&limit=10');
        const container = document.getElementById('domains-list');
        if (data && data.length) {
            container.innerHTML = data.map(d => `<div class="list-row"><strong>${d.domain || 'Unknown'}</strong> <span class="badge">${d.count || 0}</span></div>`).join('');
        } else {
            container.innerHTML = '<p>No data</p>';
        }
    }

    async function loadNSFWUsers() {
        const data = await fetchJSON('/api/top-nsfw-users?limit=10');
        const container = document.getElementById('nsfw-users-list');
        if (data && data.length) {
            container.innerHTML = data.map(u => `<div class="list-row"><strong>${u.user_id || 'Unknown'}</strong> <span class="badge">${u.count || 0}</span></div>`).join('');
        } else {
            container.innerHTML = '<p>No NSFW data</p>';
        }
    }

    async function logout() {
        await fetch('/api/logout', { method: 'POST' });
        window.location.href = '/login';
    }

    // Load all stats
    loadActiveUsers();
    loadTopDownloaders();
    loadTopDomains();
    loadNSFWUsers();

    // Auto-refresh every 30 seconds
    setInterval(() => {
        loadActiveUsers();
        loadTopDownloaders();
        loadTopDomains();
        loadNSFWUsers();
    }, 30000);
</script>
</body>
</html>
